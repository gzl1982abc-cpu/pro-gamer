<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doodle Jump - 完美修复版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 400px;
            height: 600px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.7);
            border-radius: 20px;
            overflow: hidden;
            border: 8px solid #333;
            border-top-width: 25px;
            border-bottom-width: 25px;
            background: #87CEEB;
        }
        #game-canvas { display: block; background: linear-gradient(to bottom, #87CEEB, #1E90FF); }
        #ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .score-display {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 28px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 10px rgba(255, 255, 0, 0.8);
            background: rgba(0, 0, 50, 0.7);
            padding: 8px 20px;
            border-radius: 30px;
            z-index: 10;
        }
        #start-screen, #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 20, 40, 0.92);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            pointer-events: all;
            z-index: 20;
        }
        #game-over-screen { display: none; }
        .screen-title {
            font-size: 56px;
            font-weight: bold;
            margin-bottom: 15px;
            background: linear-gradient(to right, #FFD700, #FF4500, #4CAF50);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
        }
        .screen-subtitle {
            font-size: 26px;
            margin: 15px 0 35px;
            color: #87CEFA;
            text-align: center;
            max-width: 85%;
            line-height: 1.4;
        }
        .btn {
            padding: 16px 55px;
            font-size: 26px;
            background: linear-gradient(to bottom, #4CAF50, #2E7D32);
            color: white;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 6px 0 #1B5E20, 0 10px 25px rgba(0, 0, 0, 0.5);
            transition: all 0.15s;
            pointer-events: auto;
            margin: 10px;
        }
        .btn:hover {
            background: linear-gradient(to bottom, #66BB6A, #388E3C);
            transform: translateY(-3px);
            box-shadow: 0 9px 0 #1B5E20, 0 12px 30px rgba(0, 0, 0, 0.6);
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 3px 0 #1B5E20, 0 5px 15px rgba(0, 0, 0, 0.4);
        }
        .instructions {
            position: absolute;
            bottom: 25px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #FFD700;
            font-size: 19px;
            font-weight: bold;
            padding: 0 15px;
            line-height: 1.5;
            z-index: 15;
        }
        .platform-indicator {
            position: absolute;
            right: 20px;
            top: 20px;
            width: 42px;
            height: 42px;
            background: rgba(76, 175, 80, 0.9);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 22px;
            color: white;
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.9);
            z-index: 10;
        }
        .controls-hint {
            position: absolute;
            bottom: 85px;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.85);
            font-size: 17px;
            background: rgba(0, 30, 60, 0.6);
            padding: 8px 20px;
            border-radius: 30px;
            max-width: 320px;
            margin: 0 auto;
            z-index: 15;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas" width="400" height="600"></canvas>
        
        <div id="ui-overlay">
            <div class="score-display">高度: <span id="score">0</span>m</div>
            <div class="platform-indicator" id="platform-count">0</div>
            
            <div id="start-screen">
                <div class="screen-title">Doodle Jump</div>
                <div class="screen-subtitle">✨ 视角完美跟随 | 无Bug体验</div>
                <button class="btn" id="start-btn"><span>🚀 点击开始</span></button>
                <div class="controls-hint">← → 方向键 或 倾斜设备 控制方向</div>
                <div class="instructions">✅ 已修复：初始安全 | 视角跟随 | 碰撞精准</div>
            </div>
            
            <div id="game-over-screen">
                <div class="screen-title">Game Over</div>
                <div class="screen-subtitle">最高高度: <span id="final-score">0</span>m</div>
                <button class="btn" id="restart-btn"><span>🔄 再玩一次</span></button>
                <div class="instructions">🏆 挑战更高分数！</div>
            </div>
        </div>
    </div>

    <script>
        class DoodleJump {
            constructor() {
                this.canvas = document.getElementById('game-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.width = this.canvas.width;
                this.height = this.canvas.height;
                
                // 游戏状态
                this.gameState = 'waiting';
                this.score = 0;
                this.highestY = this.height;
                this.platformCount = 0;
                this.lastPlatformY = this.height - 50;
                
                // 玩家属性
                this.player = {
                    x: this.width / 2 - 20,
                    y: this.height - 105, // 精确位于底部平台上方
                    width: 40,
                    height: 45,
                    velocityX: 0,
                    velocityY: -12, // 初始向上跳跃力
                    isOnPlatform: false,
                    facing: 'right',
                    lastPlatformSpeed: 0,
                    lastPlatformDirection: 1
                };
                
                // 游戏对象
                this.platforms = [];
                this.movingPlatforms = [];
                this.breakablePlatforms = [];
                this.stars = [];
                this.monsters = [];
                this.particles = [];
                
                // 相机系统 - 核心修复
                this.cameraY = 0;
                this.emergencyLock = false;
                
                // 输入处理
                this.keys = {};
                this.touchActive = false;
                this.deviceOrientation = { gamma: 0 };
                this.isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
                
                // 性能优化
                this.lastTime = 0;
                this.gravity = 0.6;
                this.jumpForce = -16;
                this.horizontalSpeed = 6;
                this.maxPlatforms = 25;
                
                this.init();
            }
            
            init() {
                this.generateInitialPlatforms();
                this.setupEventListeners();
                
                // 设备方向
                if (this.isMobile && typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    window.addEventListener('click', () => {
                        DeviceOrientationEvent.requestPermission()
                            .then(permissionState => {
                                if (permissionState === 'granted') {
                                    window.addEventListener('deviceorientation', (e) => {
                                        this.deviceOrientation.gamma = e.gamma;
                                    });
                                }
                            })
                            .catch(console.error);
                    }, { once: true });
                } else {
                    window.addEventListener('deviceorientation', (e) => {
                        this.deviceOrientation.gamma = e.gamma;
                    });
                }
                
                requestAnimationFrame(this.gameLoop.bind(this));
            }
            
            generateInitialPlatforms() {
                this.platforms = [];
                this.movingPlatforms = [];
                this.breakablePlatforms = [];
                
                // 1. 坚固的底部平台（加宽加厚）
                this.platforms.push({
                    x: this.width / 2 - 80,
                    y: this.height - 65,
                    width: 160,
                    height: 28,
                    type: 'normal'
                });
                
                // 2. 密集初始平台
                let lastY = this.height - 130;
                for (let i = 0; i < 12; i++) {
                    const y = lastY - (55 + Math.random() * 35);
                    this.generatePlatformAt(y);
                    lastY = y;
                }
                
                this.lastPlatformY = lastY;
                this.updatePlatformCount();
            }
            
            generatePlatformAt(y) {
                if (y > this.height + 200) return;
                
                const rand = Math.random();
                let type = 'normal';
                if (rand < 0.65) type = 'normal';
                else if (rand < 0.85) type = 'moving';
                else type = 'breakable';
                
                const width = 65 + Math.random() * 50;
                let x = Math.random() * (this.width - width);
                x = Math.max(10, Math.min(x, this.width - width - 10));
                
                const platform = { x, y, width, height: 18, type };
                
                if (type === 'normal') {
                    this.platforms.push(platform);
                } else if (type === 'moving') {
                    platform.direction = Math.random() > 0.5 ? 1 : -1;
                    platform.speed = 0.8 + Math.random() * 1.2;
                    platform.minX = 20;
                    platform.maxX = this.width - width - 20;
                    this.movingPlatforms.push(platform);
                } else if (type === 'breakable') {
                    platform.broken = false;
                    platform.breakTime = 0;
                    this.breakablePlatforms.push(platform);
                }
                
                // 生成星星
                if (Math.random() < 0.35 && y < this.height - 150) {
                    this.stars.push({
                        x: x + width/2 - 12,
                        y: y - 45,
                        width: 24,
                        height: 24,
                        collected: false,
                        floatOffset: 0
                    });
                }
                
                // 生成怪物
                if (Math.random() < 0.12 && y < this.height - 250) {
                    this.monsters.push({
                        x: x + width/2 - 18,
                        y: y - 55,
                        width: 36,
                        height: 36,
                        velocityX: (Math.random() > 0.5 ? 1 : -1) * (1.0 + Math.random() * 1.5),
                        direction: Math.random() > 0.5 ? 'right' : 'left',
                        alive: true
                    });
                }
            }
            
            setupEventListeners() {
                // 键盘
                window.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') this.keys.left = true;
                    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') this.keys.right = true;
                    if (e.key === ' ' && (this.gameState === 'gameOver' || this.gameState === 'waiting')) {
                        if (this.gameState === 'gameOver') this.restartGame();
                        else this.startGame();
                    }
                });
                
                window.addEventListener('keyup', (e) => {
                    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') this.keys.left = false;
                    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') this.keys.right = false;
                });
                
                // 触摸
                this.canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    this.touchActive = true;
                    this.touchStartX = e.touches[0].clientX;
                });
                
                this.canvas.addEventListener('touchmove', (e) => {
                    if (!this.touchActive) return;
                    e.preventDefault();
                    const touchX = e.touches[0].clientX;
                    const diff = touchX - this.touchStartX;
                    this.keys.left = diff < -15;
                    this.keys.right = diff > 15;
                });
                
                this.canvas.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    this.touchActive = false;
                    this.keys.left = false;
                    this.keys.right = false;
                });
                
                // 按钮
                document.getElementById('start-btn').addEventListener('click', () => this.startGame());
                document.getElementById('restart-btn').addEventListener('click', () => this.restartGame());
            }
            
            startGame() {
                if (this.gameState === 'playing') return;
                
                this.gameState = 'playing';
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('game-over-screen').style.display = 'none';
                this.resetPlayer();
                this.cleanupOffscreenObjects();
            }
            
            restartGame() {
                this.gameState = 'playing';
                document.getElementById('game-over-screen').style.display = 'none';
                this.resetGame();
            }
            
            resetPlayer() {
                this.player.x = this.width / 2 - this.player.width / 2;
                this.player.y = this.height - 105;
                this.player.velocityX = 0;
                this.player.velocityY = -12; // 关键：初始向上跳跃
                this.player.isOnPlatform = false;
                this.player.facing = 'right';
                this.player.lastPlatformSpeed = 0;
                this.player.lastPlatformDirection = 1;
                this.cameraY = 0;
                this.emergencyLock = false;
                this.score = 0;
                this.highestY = this.player.y;
            }
            
            resetGame() {
                this.resetPlayer();
                this.platforms = [];
                this.movingPlatforms = [];
                this.breakablePlatforms = [];
                this.stars = [];
                this.monsters = [];
                this.particles = [];
                this.generateInitialPlatforms();
            }
            
            cleanupOffscreenObjects() {
                const cleanupThreshold = this.cameraY + this.height + 300;
                
                this.platforms = this.platforms.filter(p => p.y < cleanupThreshold);
                this.movingPlatforms = this.movingPlatforms.filter(p => p.y < cleanupThreshold);
                this.breakablePlatforms = this.breakablePlatforms.filter(p => p.y < cleanupThreshold && !p.broken);
                this.stars = this.stars.filter(s => s.y < cleanupThreshold && !s.collected);
                this.monsters = this.monsters.filter(m => m.y < cleanupThreshold && m.alive);
                
                while (this.getTotalPlatforms() < this.maxPlatforms) {
                    this.lastPlatformY -= (65 + Math.random() * 45);
                    this.generatePlatformAt(this.lastPlatformY);
                }
            }
            
            getTotalPlatforms() {
                return this.platforms.length + 
                       this.movingPlatforms.length + 
                       this.breakablePlatforms.filter(p => !p.broken).length;
            }
            
            updatePlatformCount() {
                this.platformCount = this.getTotalPlatforms();
                document.getElementById('platform-count').textContent = this.platformCount;
            }
            
            update(deltaTime) {
                if (this.gameState !== 'playing') return;
                
                this.handleInput(deltaTime);
                this.updatePlayer(deltaTime);
                this.updatePlatforms(deltaTime);
                this.updateStars(deltaTime);
                this.updateMonsters(deltaTime);
                this.updateParticles(deltaTime);
                this.cleanupOffscreenObjects();
                this.updatePlatformCount();
                
                // 更新分数
                if (this.player.y < this.highestY) {
                    this.highestY = this.player.y;
                }
                this.score = Math.floor((this.height - this.highestY) / 10);
                
                // ===== 核心修复：智能相机系统 =====
                this.updateCamera(deltaTime);
                
                // 游戏结束检测
                if (this.player.y > this.cameraY + this.height + 120) {
                    this.gameOver();
                }
                
                // 安全保护：防止玩家移出屏幕顶部
                if (this.player.y < this.cameraY + 20) {
                    this.player.y = this.cameraY + 20;
                    if (this.player.velocityY < 0) this.player.velocityY = 0;
                }
            }
            
            handleInput(deltaTime) {
                this.player.velocityX = 0;
                
                if (this.keys.left) {
                    this.player.velocityX = -this.horizontalSpeed;
                    this.player.facing = 'left';
                }
                if (this.keys.right) {
                    this.player.velocityX = this.horizontalSpeed;
                    this.player.facing = 'right';
                }
                
                // 移动端倾斜控制
                if (this.isMobile && Math.abs(this.deviceOrientation.gamma) > 5) {
                    const tilt = this.deviceOrientation.gamma / 90;
                    this.player.velocityX = tilt * this.horizontalSpeed * 1.5;
                    this.player.facing = tilt < 0 ? 'left' : 'right';
                }
                
                // 屏幕循环
                if (this.player.x < -this.player.width + 10) {
                    this.player.x = this.width - 10;
                } else if (this.player.x > this.width - 10) {
                    this.player.x = -this.player.width + 10;
                }
            }
            
            updatePlayer(deltaTime) {
                const oldY = this.player.y;
                
                // 重力
                this.player.velocityY += this.gravity;
                this.player.velocityY = Math.min(this.player.velocityY, 25);
                
                // 垂直位置
                this.player.y += this.player.velocityY;
                
                // 平台碰撞
                this.player.isOnPlatform = false;
                this.checkPlatformCollisions(oldY);
                
                // 水平位置
                this.player.x += this.player.velocityX;
                
                // 移动平台带动
                if (this.player.isOnPlatform && this.player.lastPlatformSpeed !== 0) {
                    this.player.x += this.player.lastPlatformSpeed * this.player.lastPlatformDirection * deltaTime;
                }
                
                // 星星和怪物碰撞
                this.checkStarCollisions();
                this.checkMonsterCollisions();
            }
            
            checkPlatformCollisions(oldY) {
                const allPlatforms = [
                    ...this.platforms,
                    ...this.movingPlatforms,
                    ...this.breakablePlatforms.filter(p => !p.broken)
                ];
                
                for (let i = allPlatforms.length - 1; i >= 0; i--) {
                    const platform = allPlatforms[i];
                    
                    const playerBottom = this.player.y + this.player.height;
                    const playerWasAbove = oldY + this.player.height <= platform.y + 5;
                    const playerNowOnPlatform = playerBottom >= platform.y && playerBottom <= platform.y + 15;
                    const playerHorizontallyAligned = 
                        this.player.x + this.player.width > platform.x + 5 && 
                        this.player.x < platform.x + platform.width - 5;
                    const isFalling = this.player.velocityY > 0.5;
                    
                    if (playerWasAbove && playerNowOnPlatform && playerHorizontallyAligned && isFalling) {
                        this.player.y = platform.y - this.player.height;
                        this.player.velocityY = this.jumpForce;
                        this.player.isOnPlatform = true;
                        
                        if (platform.type === 'moving') {
                            this.player.lastPlatformSpeed = platform.speed;
                            this.player.lastPlatformDirection = platform.direction;
                        } else {
                            this.player.lastPlatformSpeed = 0;
                        }
                        
                        if (platform.type === 'breakable') {
                            platform.broken = true;
                            platform.breakTime = Date.now();
                            this.createParticles(platform.x + platform.width/2, platform.y, 10, '#FF9800', 2);
                        }
                        
                        const color = platform.type === 'moving' ? '#2196F3' : 
                                     platform.type === 'breakable' ? '#FF5722' : '#4CAF50';
                        this.createParticles(platform.x + platform.width/2, platform.y, 6, color, 1.5);
                        
                        break;
                    }
                }
            }
            
            checkStarCollisions() {
                for (let i = this.stars.length - 1; i >= 0; i--) {
                    const star = this.stars[i];
                    if (star.collected) continue;
                    
                    if (this.checkCollision(this.player, star)) {
                        star.collected = true;
                        this.score += 25;
                        this.createParticles(star.x + star.width/2, star.y + star.height/2, 12, '#FFD700', 2.5);
                        
                        setTimeout(() => {
                            this.stars = this.stars.filter(s => s !== star);
                        }, 500);
                    }
                }
            }
            
            checkMonsterCollisions() {
                for (const monster of this.monsters) {
                    if (!monster.alive) continue;
                    
                    if (this.checkCollision(this.player, monster)) {
                        this.createParticles(monster.x + monster.width/2, monster.y + monster.height/2, 15, '#FF1744', 3);
                        monster.alive = false;
                        
                        setTimeout(() => {
                            if (this.gameState === 'playing') {
                                this.gameOver();
                            }
                        }, 100);
                        
                        break;
                    }
                }
            }
            
            updatePlatforms(deltaTime) {
                for (const platform of this.movingPlatforms) {
                    platform.x += platform.speed * platform.direction * deltaTime;
                    
                    if (platform.x <= platform.minX) {
                        platform.x = platform.minX;
                        platform.direction = 1;
                    } else if (platform.x >= platform.maxX) {
                        platform.x = platform.maxX;
                        platform.direction = -1;
                    }
                }
                
                for (const platform of this.breakablePlatforms) {
                    if (platform.broken && Date.now() - platform.breakTime > 800) {
                        platform.height = Math.max(0, platform.height - 0.4 * deltaTime);
                    }
                }
            }
            
            updateStars(deltaTime) {
                for (const star of this.stars) {
                    if (star.collected) continue;
                    star.floatOffset += 0.05 * deltaTime;
                    star.y += Math.sin(star.floatOffset) * 0.4;
                }
            }
            
            updateMonsters(deltaTime) {
                for (const monster of this.monsters) {
                    if (!monster.alive) continue;
                    
                    monster.x += monster.velocityX * deltaTime;
                    
                    if (monster.x < -monster.width + 10) {
                        monster.x = this.width - 10;
                    } else if (monster.x > this.width - 10) {
                        monster.x = -monster.width + 10;
                    }
                    
                    if (Math.random() < 0.005) {
                        monster.velocityX *= -1;
                        monster.direction = monster.direction === 'right' ? 'left' : 'right';
                    }
                }
            }
            
            updateParticles(deltaTime) {
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx * deltaTime;
                    p.y += p.vy * deltaTime;
                    p.vy += 0.12 * deltaTime;
                    p.life -= deltaTime;
                    p.size *= 0.985;
                    
                    if (p.life <= 0 || p.size < 0.6) {
                        this.particles.splice(i, 1);
                    }
                }
            }
            
            // ===== 核心修复：智能相机系统 =====
            updateCamera(deltaTime) {
                // 理想相机位置：玩家保持在屏幕38%高度
                const idealCameraY = Math.max(0, this.player.y - this.height * 0.38);
                
                // 紧急锁定：当玩家接近屏幕顶部25%区域
                if (this.player.y < this.cameraY + this.height * 0.25) {
                    this.emergencyLock = true;
                    this.cameraY = idealCameraY; // 立即锁定
                } 
                // 平滑跟随：当玩家在安全区域
                else if (this.player.y > this.cameraY + this.height * 0.35) {
                    this.emergencyLock = false;
                    
                    // 动态插值：差距越大，跟随越快
                    const diff = idealCameraY - this.cameraY;
                    if (Math.abs(diff) > 0.5) {
                        const speedFactor = Math.min(0.3, Math.abs(diff) / 100) + 0.08;
                        this.cameraY += diff * speedFactor * deltaTime;
                    }
                }
                
                // 边界限制
                this.cameraY = Math.max(0, this.cameraY);
                
                // 防止看到空白区域
                const allPlatforms = [
                    ...this.platforms,
                    ...this.movingPlatforms,
                    ...this.breakablePlatforms.filter(p => !p.broken)
                ];
                
                if (allPlatforms.length > 0) {
                    const highestPlatformY = Math.min(...allPlatforms.map(p => p.y));
                    const maxCameraY = Math.max(0, highestPlatformY - this.height + 120);
                    this.cameraY = Math.min(this.cameraY, maxCameraY);
                }
            }
            
            checkCollision(rect1, rect2) {
                return rect1.x + 5 < rect2.x + rect2.width - 5 &&
                       rect1.x + rect1.width - 5 > rect2.x + 5 &&
                       rect1.y + 5 < rect2.y + rect2.height - 5 &&
                       rect1.y + rect1.height - 5 > rect2.y + 5;
            }
            
            createParticles(x, y, count, color, intensity = 1) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 1.2 + Math.random() * 2.8;
                    
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed * intensity,
                        vy: Math.sin(angle) * speed * intensity - 2.5,
                        life: 28 + Math.random() * 18,
                        size: 3.5 + Math.random() * 3.5,
                        color: color
                    });
                }
            }
            
            gameOver() {
                this.gameState = 'gameOver';
                document.getElementById('final-score').textContent = this.score;
                document.getElementById('game-over-screen').style.display = 'flex';
                this.createParticles(this.player.x + 20, this.player.y + 20, 25, '#FF1744', 2.8);
            }
            
            render() {
                this.ctx.clearRect(0, 0, this.width, this.height);
                
                // 背景
                const gradient = this.ctx.createLinearGradient(0, -this.cameraY, 0, this.height - this.cameraY);
                gradient.addColorStop(0, '#1e3c72');
                gradient.addColorStop(1, '#87CEEB');
                this.ctx.fillStyle = gradient;
                this.ctx.fillRect(0, 0, this.width, this.height);
                
                // 云朵（简化版）
                this.ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
                const cloudY1 = 100 - this.cameraY * 0.5;
                const cloudY2 = 200 - this.cameraY * 0.5;
                if (cloudY1 > -50 && cloudY1 < this.height + 50) {
                    this.ctx.beginPath();
                    this.ctx.arc(80, cloudY1, 20, 0, Math.PI * 2);
                    this.ctx.arc(110, cloudY1 - 5, 25, 0, Math.PI * 2);
                    this.ctx.arc(140, cloudY1, 20, 0, Math.PI * 2);
                    this.ctx.fill();
                }
                if (cloudY2 > -50 && cloudY2 < this.height + 50) {
                    this.ctx.beginPath();
                    this.ctx.arc(250, cloudY2, 18, 0, Math.PI * 2);
                    this.ctx.arc(280, cloudY2 - 4, 22, 0, Math.PI * 2);
                    this.ctx.arc(310, cloudY2, 18, 0, Math.PI * 2);
                    this.ctx.fill();
                }
                
                // 平台
                this.ctx.fillStyle = '#4CAF50';
                this.platforms.forEach(platform => {
                    const screenY = platform.y - this.cameraY;
                    if (screenY > this.height + 60 || screenY < -80) return;
                    
                    this.ctx.fillRect(platform.x, screenY, platform.width, platform.height);
                    this.ctx.fillStyle = '#66BB6A';
                    this.ctx.fillRect(platform.x, screenY, platform.width, 4);
                    this.ctx.fillStyle = '#4CAF50';
                });
                
                this.ctx.fillStyle = '#2196F3';
                this.movingPlatforms.forEach(platform => {
                    const screenY = platform.y - this.cameraY;
                    if (screenY > this.height + 60 || screenY < -80) return;
                    
                    this.ctx.fillRect(platform.x, screenY, platform.width, platform.height);
                    this.ctx.fillStyle = '#42A5F5';
                    this.ctx.fillRect(platform.x, screenY, platform.width, 4);
                    this.ctx.fillStyle = '#2196F3';
                });
                
                this.breakablePlatforms.forEach(platform => {
                    if (platform.broken && platform.height < 2) return;
                    
                    const screenY = platform.y - this.cameraY;
                    if (screenY > this.height + 60 || screenY < -80) return;
                    
                    this.ctx.fillStyle = platform.broken ? '#FF5722' : '#FF9800';
                    this.ctx.fillRect(platform.x, screenY, platform.width, platform.height);
                });
                
                // 星星
                this.ctx.fillStyle = '#FFD700';
                this.stars.forEach(star => {
                    if (star.collected) return;
                    
                    const screenY = star.y - this.cameraY;
                    if (screenY > this.height + 60 || screenY < -60) return;
                    
                    this.ctx.save();
                    this.ctx.translate(star.x + 12, screenY + 12);
                    this.ctx.rotate(Date.now() / 280);
                    
                    this.ctx.beginPath();
                    for (let i = 0; i < 5; i++) {
                        const angle = (i * Math.PI * 2) / 5 - Math.PI / 2;
                        const length = i % 2 === 0 ? 12 : 4.8;
                        const x = Math.cos(angle) * length;
                        const y = Math.sin(angle) * length;
                        if (i === 0) this.ctx.moveTo(x, y);
                        else this.ctx.lineTo(x, y);
                    }
                    this.ctx.closePath();
                    this.ctx.fill();
                    
                    this.ctx.restore();
                });
                
                // 怪物
                this.monsters.forEach(monster => {
                    if (!monster.alive) return;
                    
                    const screenY = monster.y - this.cameraY;
                    if (screenY > this.height + 60 || screenY < -60) return;
                    
                    this.ctx.save();
                    this.ctx.translate(monster.x + 18, screenY + 18);
                    
                    if (monster.direction === 'left') {
                        this.ctx.scale(-1, 1);
                    }
                    
                    this.ctx.fillStyle = '#F44336';
                    this.ctx.beginPath();
                    this.ctx.arc(0, 0, 16, 0, Math.PI * 2);
                    this.ctx.fill();
                    
                    this.ctx.fillStyle = 'white';
                    this.ctx.beginPath();
                    this.ctx.arc(6, -4, 5.5, 0, Math.PI * 2);
                    this.ctx.fill();
                    
                    this.ctx.fillStyle = 'black';
                    this.ctx.beginPath();
                    this.ctx.arc(6.5, -3.5, 2.8, 0, Math.PI * 2);
                    this.ctx.fill();
                    
                    this.ctx.strokeStyle = 'black';
                    this.ctx.lineWidth = 2.5;
                    this.ctx.beginPath();
                    this.ctx.arc(0, 4, 6.5, 0, Math.PI);
                    this.ctx.stroke();
                    
                    this.ctx.restore();
                });
                
                // 玩家
                const screenY = this.player.y - this.cameraY;
                if (screenY > -60 && screenY < this.height + 60) {
                    this.ctx.save();
                    this.ctx.translate(this.player.x + 20, screenY + 22.5);
                    
                    if (this.player.facing === 'left') {
                        this.ctx.scale(-1, 1);
                    }
                    
                    this.ctx.fillStyle = '#4CAF50';
                    this.ctx.beginPath();
                    this.ctx.ellipse(0, 0, 19, 22, 0, 0, Math.PI * 2);
                    this.ctx.fill();
                    
                    this.ctx.fillStyle = '#81C784';
                    this.ctx.beginPath();
                    this.ctx.ellipse(0, 5, 14, 12, 0, 0, Math.PI * 2);
                    this.ctx.fill();
                    
                    this.ctx.fillStyle = 'white';
                    this.ctx.beginPath();
                    this.ctx.arc(8, -6, 6.5, 0, Math.PI * 2);
                    this.ctx.fill();
                    
                    this.ctx.fillStyle = 'black';
                    this.ctx.beginPath();
                    this.ctx.arc(8.5, -5.5, 3.2, 0, Math.PI * 2);
                    this.ctx.fill();
                    
                    this.ctx.strokeStyle = 'black';
                    this.ctx.lineWidth = 2.5;
                    this.ctx.beginPath();
                    if (this.player.velocityY < -8) {
                        this.ctx.arc(0, 2, 7.5, Math.PI, Math.PI * 2);
                    } else if (this.player.velocityY > 8) {
                        this.ctx.moveTo(-7.5, 6);
                        this.ctx.lineTo(7.5, 6);
                    } else {
                        this.ctx.arc(0, 4, 6.5, 0, Math.PI);
                    }
                    this.ctx.stroke();
                    
                    this.ctx.fillStyle = '#2E7D32';
                    if (Math.abs(this.player.velocityY) < 3) {
                        this.ctx.fillRect(-8, 19, 6, 11);
                        this.ctx.fillRect(2, 19, 6, 11);
                    } else {
                        this.ctx.fillRect(-7, 16, 5, 14);
                        this.ctx.fillRect(2, 16, 5, 14);
                    }
                    
                    this.ctx.restore();
                }
                
                // 粒子
                this.particles.forEach(p => {
                    const screenY = p.y - this.cameraY;
                    if (screenY > this.height + 60 || screenY < -60) return;
                    
                    this.ctx.globalAlpha = Math.min(1, p.life / 35);
                    this.ctx.fillStyle = p.color;
                    
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, screenY, p.size, 0, Math.PI * 2);
                    this.ctx.fill();
                    
                    this.ctx.globalAlpha = 1;
                });
                
                // 更新UI
                document.getElementById('score').textContent = this.score;
            }
            
            gameLoop(timestamp) {
                const deltaTime = this.lastTime ? Math.min((timestamp - this.lastTime) / 16.67, 5) : 1;
                this.lastTime = timestamp;
                
                this.update(deltaTime);
                this.render();
                
                requestAnimationFrame(this.gameLoop.bind(this));
            }
        }

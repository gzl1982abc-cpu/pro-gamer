<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STREET RACING PRO - Mobile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: white;
            touch-action: none;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 480px;
            height: 80vh;
            max-height: 800px;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0, 206, 209, 0.7);
            background: rgba(15, 15, 30, 0.95);
            border: 3px solid rgba(100, 200, 255, 0.3);
            margin: 20px;
        }

        .road {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #2c2c4a 0%, #1a1a2e 100%);
            overflow: hidden;
        }

        .road-markings {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .road-marking {
            position: absolute;
            width: 12px;
            height: 60px;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.3));
            left: 50%;
            transform: translateX(-50%);
            border-radius: 3px;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
        }

        .side-line {
            position: absolute;
            width: 6px;
            height: 100%;
            background: linear-gradient(to bottom, rgba(100, 200, 255, 0.7), rgba(100, 200, 255, 0.3));
            box-shadow: 0 0 15px rgba(100, 200, 255, 0.5);
        }

        .side-line.left {
            left: 40px;
        }

        .side-line.right {
            right: 40px;
        }

        .player-car {
            position: absolute;
            width: 60px;
            height: 100px;
            background: linear-gradient(135deg, #ff4d94, #ff1a75);
            border-radius: 15px 15px 10px 10px;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 
                0 0 30px rgba(255, 26, 117, 0.8),
                inset 0 0 15px rgba(255, 255, 255, 0.2);
            z-index: 100;
            transition: transform 0.1s ease;
        }

        .car-window {
            position: absolute;
            width: 40px;
            height: 25px;
            background: linear-gradient(135deg, #0a0a1a, #1a1a2e);
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 5px 5px 0 0;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .car-light {
            position: absolute;
            width: 10px;
            height: 12px;
            background: linear-gradient(135deg, #ffeb3b, #ffc107);
            bottom: 8px;
            border-radius: 2px;
            box-shadow: 0 0 15px #ffeb3b;
        }

        .car-light.left {
            left: 12px;
        }

        .car-light.right {
            right: 12px;
        }

        .car-exhaust {
            position: absolute;
            width: 12px;
            height: 8px;
            background: linear-gradient(135deg, #ff5252, #ff1744);
            bottom: -3px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 3px;
            box-shadow: 0 0 15px rgba(255, 26, 26, 0.8);
        }

        /* 重新设计障碍物 - 更清晰的车辆形象 */
        .obstacle {
            position: absolute;
            border-radius: 12px;
            z-index: 50;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .obstacle-car {
            width: 50px;
            height: 80px;
            background: linear-gradient(135deg, #3498db, #2980b9);
            display: flex;
            flex-direction: column;
        }

        .obstacle-car-top {
            height: 30px;
            background: linear-gradient(135deg, #2c3e50, #1a1a2e);
        }

        .obstacle-car-bottom {
            height: 50px;
            background: linear-gradient(135deg, #3498db, #2980b9);
        }

        .obstacle-truck {
            width: 70px;
            height: 90px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            display: flex;
            flex-direction: column;
        }

        .obstacle-truck-cab {
            height: 40px;
            background: linear-gradient(135deg, #27ae60, #219653);
        }

        .obstacle-truck-body {
            height: 50px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
        }

        .obstacle-police {
            width: 55px;
            height: 85px;
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            display: flex;
            flex-direction: column;
        }

        .obstacle-police-top {
            height: 35px;
            background: linear-gradient(135deg, #8e44ad, #7d3c98);
        }

        .obstacle-police-bottom {
            height: 50px;
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            position: relative;
        }

        .police-light {
            position: absolute;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 10px;
            background: linear-gradient(90deg, #ff5252, #ffeb3b, #2196f3);
            border-radius: 5px;
            animation: policeLight 0.5s infinite alternate;
        }

        .obstacle-motorcycle {
            width: 30px;
            height: 60px;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            display: flex;
            flex-direction: column;
        }

        .motorcycle-seat {
            height: 20px;
            background: linear-gradient(135deg, #c0392b, #a93226);
        }

        .motorcycle-body {
            height: 40px;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
        }

        .coin {
            position: absolute;
            width: 25px;
            height: 25px;
            background: radial-gradient(circle, #ffd700, #ffaa00);
            border-radius: 50%;
            z-index: 40;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            animation: coinSpin 1s infinite linear;
        }

        .nitro-powerup {
            position: absolute;
            width: 35px;
            height: 35px;
            background: radial-gradient(circle, #00ffff, #00bfff);
            border-radius: 50%;
            z-index: 40;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.9);
            animation: pulse 1.5s infinite alternate;
        }

        .shield-powerup {
            position: absolute;
            width: 35px;
            height: 35px;
            background: radial-gradient(circle, #4caf50, #2e7d32);
            border-radius: 50%;
            z-index: 40;
            box-shadow: 0 0 25px rgba(76, 175, 80, 0.9);
            animation: shieldPulse 2s infinite alternate;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .shield-powerup::before {
            content: '';
            position: absolute;
            width: 25px;
            height: 25px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
        }

        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            z-index: 200;
            pointer-events: none;
        }

        .explosion {
            position: absolute;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, #ff5252, #ff1744, transparent);
            border-radius: 50%;
            z-index: 300;
            opacity: 1;
            transform: scale(0);
            animation: explosion 0.5s forwards;
        }

        /* 顶部UI - 简洁设计 */
        .top-ui {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            padding: 0 20px;
            z-index: 200;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .score-display {
            font-size: 24px;
            font-weight: bold;
            color: #ffeb3b;
            text-shadow: 0 0 10px rgba(255, 235, 59, 0.7);
            font-family: 'Courier New', monospace;
        }

        .speed-display {
            font-size: 20px;
            font-weight: bold;
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.7);
        }

        /* 技能栏 - 底部固定，更加明确 */
        .skills-bar {
            position: absolute;
            bottom: 140px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 250;
            padding: 0 15px;
        }

        .skill-slot {
            position: relative;
            width: 75px;
            height: 75px;
            background: rgba(30, 30, 50, 0.85);
            border: 3px solid rgba(100, 200, 255, 0.6);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            touch-action: manipulation;
        }

        .skill-slot:active {
            transform: scale(0.95);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
        }

        .skill-slot.inactive {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .skill-icon {
            font-size: 32px;
            margin-bottom: 5px;
        }

        .skill-nitro .skill-icon { color: #00ffff; }
        .skill-shield .skill-icon { color: #4caf50; }
        .skill-drift .skill-icon { color: #ffeb3b; }

        .skill-name {
            font-size: 11px;
            font-weight: bold;
            color: #a0a0c0;
            text-align: center;
        }

        .skill-cooldown {
            position: absolute;
            bottom: 3px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: #ff5252;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(255, 82, 82, 0.8);
        }

        .skill-charge {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 5px;
            background: linear-gradient(90deg, #00ffff, #4caf50);
            border-radius: 0 0 18px 18px;
            transition: width 0.3s ease;
        }

        /* 氮气槽 - 重新设计位置 */
        .nitro-container {
            position: absolute;
            bottom: 100px;
            left: 20px;
            right: 20px;
            height: 30px;
            z-index: 200;
        }

        .nitro-bar-background {
            width: 100%;
            height: 100%;
            background: rgba(40, 40, 70, 0.8);
            border-radius: 15px;
            border: 3px solid rgba(100, 200, 255, 0.6);
            overflow: hidden;
            box-shadow: 0 0 12px rgba(0, 255, 255, 0.4);
        }

        .nitro-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ffff, #00bfff);
            border-radius: 12px;
            transition: width 0.3s ease;
            box-shadow: inset 0 0 18px rgba(0, 255, 255, 0.9);
        }

        /* 移动端优化的控制按钮 - 大尺寸、易触控 */
        .mobile-controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 300;
            padding: 0 25px;
        }

        .control-area {
            width: 45%;
            display: flex;
            justify-content: center;
        }

        .control-btn {
            width: 85px;
            height: 85px;
            background: linear-gradient(135deg, #4a4a78, #3a3a60);
            border: 4px solid rgba(150, 220, 255, 0.8);
            border-radius: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5);
            touch-action: manipulation;
        }

        .control-btn:active {
            transform: scale(0.92);
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.3);
            background: linear-gradient(135deg, #5a5a88, #4a4a70);
        }

        /* 添加虚拟摇杆样式 */
        .joystick-container {
            display: none; /* 默认隐藏，可选功能 */
            position: absolute;
            bottom: 40px;
            left: 20px;
            width: 120px;
            height: 120px;
            background: rgba(50, 50, 80, 0.4);
            border-radius: 50%;
            z-index: 300;
            touch-action: none;
        }

        .joystick-base {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(100, 150, 255, 0.3);
            border: 3px solid rgba(150, 220, 255, 0.6);
        }

        .joystick-thumb {
            position: absolute;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #4a4a78, #3a3a60);
            border: 3px solid rgba(150, 220, 255, 0.8);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            touch-action: none;
        }

        /* 游戏结束界面 */
        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 15, 30, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 300;
            display: none;
        }

        .game-over h1 {
            font-size: 48px;
            font-weight: bold;
            color: #ff1a75;
            text-shadow: 0 0 30px rgba(255, 26, 117, 0.8);
            margin-bottom: 20px;
            text-align: center;
        }

        .game-over-stats {
            display: flex;
            gap: 25px;
            margin: 20px 0;
        }

        .stat-box {
            text-align: center;
            padding: 15px 25px;
            background: rgba(40, 40, 70, 0.8);
            border-radius: 15px;
            border: 2px solid rgba(150, 220, 255, 0.5);
        }

        .stat-title {
            font-size: 16px;
            color: #a0a0c0;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #ffeb3b;
            text-shadow: 0 0 10px rgba(255, 235, 59, 0.7);
        }

        .action-buttons {
            display: flex;
            gap: 20px;
            margin-top: 25px;
        }

        .action-btn {
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #4a4a78, #3a3a60);
            color: white;
            border: 3px solid rgba(150, 220, 255, 0.8);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
            touch-action: manipulation;
        }

        .action-btn:active {
            transform: scale(0.95);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
        }

        .countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            font-weight: bold;
            color: #ff1a75;
            text-shadow: 0 0 40px rgba(255, 26, 117, 0.9);
            z-index: 250;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* 简洁的背景 - 减少视觉干扰 */
        .background-stars {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 5;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: 0.6;
        }

        @keyframes coinSpin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.7; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        @keyframes shieldPulse {
            0% { transform: scale(1); box-shadow: 0 0 25px rgba(76, 175, 80, 0.9); }
            100% { transform: scale(1.1); box-shadow: 0 0 35px rgba(76, 175, 80, 1); }
        }

        @keyframes explosion {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        @keyframes policeLight {
            0% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        @keyframes starBlink {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        /* 移动端优化提示 */
        .mobile-tip {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            z-index: 400;
            text-align: center;
            padding: 5px 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="road">
            <div class="road-markings" id="road-markings"></div>
            <div class="side-line left"></div>
            <div class="side-line right"></div>
            <div class="background-stars" id="background-stars"></div>
        </div>
        
        <div class="player-car" id="player-car">
            <div class="car-window"></div>
            <div class="car-light left"></div>
            <div class="car-light right"></div>
            <div class="car-exhaust"></div>
        </div>
        
        <div class="top-ui">
            <div class="score-display" id="score">SCORE: 0</div>
            <div class="speed-display" id="speed">SPEED: 0 KM/H</div>
        </div>
        
        <div class="nitro-container">
            <div class="nitro-bar-background">
                <div class="nitro-bar-fill" id="nitro-bar"></div>
            </div>
        </div>
        
        <div class="skills-bar">
            <div class="skill-slot skill-nitro" id="nitro-skill">
                <div class="skill-icon">⚡</div>
                <div class="skill-name">NITRO</div>
                <div class="skill-cooldown" id="nitro-cooldown"></div>
                <div class="skill-charge" id="nitro-charge"></div>
            </div>
            <div class="skill-slot skill-shield" id="shield-skill">
                <div class="skill-icon">🛡️</div>
                <div class="skill-name">SHIELD</div>
                <div class="skill-cooldown" id="shield-cooldown"></div>
            </div>
            <div class="skill-slot skill-drift" id="drift-skill">
                <div class="skill-icon">🔥</div>
                <div class="skill-name">DRIFT</div>
                <div class="skill-cooldown" id="drift-cooldown"></div>
            </div>
        </div>
        
        <!-- 移动端优化的控制按钮 -->
        <div class="mobile-controls">
            <div class="control-area">
                <div class="control-btn" id="left-btn">←</div>
            </div>
            <div class="control-area">
                <div class="control-btn" id="right-btn">→</div>
            </div>
        </div>
        
        <div class="countdown" id="countdown">3</div>
        
        <div class="game-over" id="game-over">
            <h1>RACE OVER</h1>
            
            <div class="game-over-stats">
                <div class="stat-box">
                    <div class="stat-title">FINAL SCORE</div>
                    <div class="stat-value" id="final-score">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-title">MAX SPEED</div>
                    <div class="stat-value" id="max-speed">0 KM/H</div>
                </div>
            </div>
            
            <div class="action-buttons">
                <button class="action-btn" id="restart-btn">RESTART</button>
                <button class="action-btn" id="menu-btn">MENU</button>
            </div>
        </div>
        
        <div class="mobile-tip">🎮 Tap left/right buttons to steer | Tap skill buttons to use powers</div>
    </div>

    <script>
        class StreetRacingProMobile {
            constructor() {
                // DOM元素
                this.playerCar = document.getElementById('player-car');
                this.road = document.querySelector('.road');
                this.scoreDisplay = document.getElementById('score');
                this.speedDisplay = document.getElementById('speed');
                this.nitroBar = document.getElementById('nitro-bar');
                this.nitroChargeBar = document.getElementById('nitro-charge');
                this.countdownElement = document.getElementById('countdown');
                this.gameOverScreen = document.getElementById('game-over');
                this.finalScoreDisplay = document.getElementById('final-score');
                this.maxSpeedDisplay = document.getElementById('max-speed');
                
                // 技能按钮
                this.nitroSkillBtn = document.getElementById('nitro-skill');
                this.shieldSkillBtn = document.getElementById('shield-skill');
                this.driftSkillBtn = document.getElementById('drift-skill');
                this.nitroCooldown = document.getElementById('nitro-cooldown');
                this.shieldCooldown = document.getElementById('shield-cooldown');
                this.driftCooldown = document.getElementById('drift-cooldown');
                
                // 控制按钮
                this.leftBtn = document.getElementById('left-btn');
                this.rightBtn = document.getElementById('right-btn');
                this.restartBtn = document.getElementById('restart-btn');
                this.menuBtn = document.getElementById('menu-btn');
                
                // 游戏状态
                this.playerX = 240; // 初始位置
                this.playerY = 610; // 固定Y位置
                this.playerSpeed = 0;
                this.maxSpeed = 40;
                this.baseAcceleration = 0.8;
                this.acceleration = this.baseAcceleration;
                this.deceleration = 0.5;
                this.turnSpeed = 12;
                this.score = 0;
                this.maxSpeedAchieved = 0;
                this.gameOver = false;
                this.gameStarted = false;
                this.nitroActive = false;
                this.shieldActive = false;
                this.driftActive = false;
                this.nitroCharge = 0;
                this.nitroMax = 100;
                this.skillCooldowns = {
                    nitro: 0,
                    shield: 0,
                    drift: 0
                };
                
                // 游戏对象
                this.obstacles = [];
                this.coins = [];
                this.powerups = [];
                this.particles = [];
                this.keys = {};
                this.roadOffset = 0;
                this.difficulty = 1;
                this.obstacleFrequency = 1000;
                this.coinFrequency = 800;
                this.powerupFrequency = 1500;
                
                // 获取容器尺寸
                this.container = document.querySelector('.game-container');
                this.containerWidth = this.container.offsetWidth;
                this.containerHeight = this.container.offsetHeight;
                
                // 初始化
                this.init();
            }
            
            init() {
                // 监听窗口大小变化
                window.addEventListener('resize', () => {
                    this.containerWidth = this.container.offsetWidth;
                    this.containerHeight = this.container.offsetHeight;
                    this.playerX = this.containerWidth / 2;
                });
                
                this.createRoadMarkings();
                this.createBackgroundStars();
                this.setupEventListeners();
                this.showCountdown();
            }
            
            createRoadMarkings() {
                const roadMarkings = document.getElementById('road-markings');
                roadMarkings.innerHTML = '';
                for (let i = 0; i < 25; i++) {
                    const marking = document.createElement('div');
                    marking.className = 'road-marking';
                    marking.style.top = `${i * 40}px`;
                    roadMarkings.appendChild(marking);
                }
            }
            
            createBackgroundStars() {
                const starsContainer = document.getElementById('background-stars');
                starsContainer.innerHTML = '';
                const starCount = 80;
                
                for (let i = 0; i < starCount; i++) {
                    const star = document.createElement('div');
                    star.className = 'star';
                    
                    const size = 1 + Math.random() * 2;
                    const leftPos = Math.random() * this.containerWidth;
                    const topPos = Math.random() * this.containerHeight;
                    const opacity = 0.2 + Math.random() * 0.8;
                    
                    star.style.width = `${size}px`;
                    star.style.height = `${size}px`;
                    star.style.left = `${leftPos}px`;
                    star.style.top = `${topPos}px`;
                    star.style.opacity = opacity;
                    star.style.animation = `starBlink ${2 + Math.random() * 4}s infinite`;
                    
                    starsContainer.appendChild(star);
                }
            }
            
            setupEventListeners() {
                // 键盘控制（桌面端兼容）
                window.addEventListener('keydown', (e) => {
                    this.keys[e.key] = true;
                    
                    // 技能快捷键
                    if (e.key === '1' && !this.skillCooldowns.nitro && this.nitroCharge >= 30) this.activateNitro();
                    if (e.key === '2' && !this.skillCooldowns.shield) this.activateShield();
                    if (e.key === '3' && !this.skillCooldowns.drift) this.activateDrift();
                    
                    // 空格键加速
                    if (e.key === ' ' && !this.nitroActive) {
                        this.accelerate();
                    }
                    
                    // R键重新开始
                    if (e.key === 'r' && this.gameOver) {
                        this.restartGame();
                    }
                });
                
                window.addEventListener('keyup', (e) => {
                    this.keys[e.key] = false;
                });
                
                // 触屏控制 - 左按钮
                this.leftBtn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    this.keys.ArrowLeft = true;
                });
                
                this.leftBtn.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    this.keys.ArrowLeft = false;
                });
                
                this.leftBtn.addEventListener('mousedown', (e) => {
                    this.keys.ArrowLeft = true;
                });
                
                this.leftBtn.addEventListener('mouseup', (e) => {
                    this.keys.ArrowLeft = false;
                });
                
                this.leftBtn.addEventListener('mouseleave', (e) => {
                    this.keys.ArrowLeft = false;
                });
                
                // 触屏控制 - 右按钮
                this.rightBtn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    this.keys.ArrowRight = true;
                });
                
                this.rightBtn.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    this.keys.ArrowRight = false;
                });
                
                this.rightBtn.addEventListener('mousedown', (e) => {
                    this.keys.ArrowRight = true;
                });
                
                this.rightBtn.addEventListener('mouseup', (e) => {
                    this.keys.ArrowRight = false;
                });
                
                this.rightBtn.addEventListener('mouseleave', (e) => {
                    this.keys.ArrowRight = false;
                });
                
                // 技能按钮 - 触屏优化
                this.nitroSkillBtn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    if (!this.skillCooldowns.nitro && this.nitroCharge >= 30) {
                        this.activateNitro();
                    }
                });
                
                this.nitroSkillBtn.addEventListener('click', (e) => {
                    if (!this.skillCooldowns.nitro && this.nitroCharge >= 30) {
                        this.activateNitro();
                    }
                });
                
                this.shieldSkillBtn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    if (!this.skillCooldowns.shield) {
                        this.activateShield();
                    }
                });
                
                this.shieldSkillBtn.addEventListener('click', (e) => {
                    if (!this.skillCooldowns.shield) {
                        this.activateShield();
                    }
                });
                
                this.driftSkillBtn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    if (!this.skillCooldowns.drift) {
                        this.activateDrift();
                    }
                });
                
                this.driftSkillBtn.addEventListener('click', (e) => {
                    if (!this.skillCooldowns.drift) {
                        this.activateDrift();
                    }
                });
                
                // 重新开始和菜单按钮
                this.restartBtn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    this.restartGame();
                });
                
                this.restartBtn.addEventListener('click', () => {
                    this.restartGame();
                });
                
                this.menuBtn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    this.showMainMenu();
                });
                
                this.menuBtn.addEventListener('click', () => {
                    this.showMainMenu();
                });
                
                // 防止页面滚动
                document.addEventListener('touchmove', (e) => {
                    if (e.target.closest('.control-btn, .skill-slot, .action-btn')) {
                        e.preventDefault();
                    }
                }, { passive: false });
            }
            
            showCountdown() {
                let count = 3;
                this.countdownElement.style.opacity = '1';
                this.countdownElement.style.display = 'block';
                
                const countdownInterval = setInterval(() => {
                    if (count > 0) {
                        this.countdownElement.textContent = count;
                        count--;
                    } else {
                        this.countdownElement.textContent = 'GO!';
                        setTimeout(() => {
                            this.countdownElement.style.opacity = '0';
                            setTimeout(() => {
                                this.countdownElement.style.display = 'none';
                                this.gameStarted = true;
                                this.startGame();
                            }, 300);
                        }, 500);
                        clearInterval(countdownInterval);
                    }
                }, 1000);
            }
            
            startGame() {
                this.gameLoop();
                this.spawnObstacles();
                this.spawnCoins();
                this.spawnPowerups();
                this.updateRoad();
            }
            
            gameLoop() {
                if (!this.gameOver && this.gameStarted) {
                    this.updatePlayer();
                    this.moveObstacles();
                    this.moveCoins();
                    this.movePowerups();
                    this.updateParticles();
                    this.checkCollisions();
                    this.updateGameStats();
                    this.updateSkillsUI();
                    
                    requestAnimationFrame(() => this.gameLoop());
                }
            }
            
            updatePlayer() {
                // 处理转向
                const maxLeft = 70;
                const maxRight = this.containerWidth - 70;
                
                if (this.keys.ArrowLeft) {
                    this.playerX = Math.max(maxLeft, this.playerX - this.turnSpeed);
                    this.playerCar.style.transform = `translateX(-50%) rotateZ(-3deg)`;
                } else if (this.keys.ArrowRight) {
                    this.playerX = Math.min(maxRight, this.playerX + this.turnSpeed);
                    this.playerCar.style.transform = `translateX(-50%) rotateZ(3deg)`;
                } else {
                    this.playerCar.style.transform = `translateX(-50%) rotateZ(0deg)`;
                }
                
                // 更新玩家位置
                this.playerCar.style.left = `${this.playerX}px`;
                
                // 加速/减速
                if (this.keys[' '] && !this.nitroActive) {
                    this.playerSpeed = Math.min(this.maxSpeed, this.playerSpeed + this.acceleration);
                } else {
                    this.playerSpeed = Math.max(0, this.playerSpeed - this.deceleration);
                }
                
                // 更新氮气充能
                if (this.playerSpeed > 10) {
                    this.nitroCharge = Math.min(this.nitroMax, this.nitroCharge + 0.2);
                    this.nitroBar.style.width = `${this.nitroCharge}%`;
                    this.nitroChargeBar.style.width = `${this.nitroCharge}%`;
                }
                
                // 氮气效果
                if (this.nitroActive) {
                    const exhaust = this.playerCar.querySelector('.car-exhaust');
                    exhaust.style.boxShadow = '0 0 30px rgba(255, 255, 255, 0.9), 0 0 60px rgba(0, 255, 255, 0.8)';
                }
                
                // 护盾效果
                if (this.shieldActive) {
                    this.playerCar.style.boxShadow = '0 0 30px rgba(76, 175, 80, 0.9), 0 0 60px rgba(76, 175, 80, 0.7), inset 0 0 15px rgba(255, 255, 255, 0.2)';
                }
                
                // 更新最高速度记录
                this.maxSpeedAchieved = Math.max(this.maxSpeedAchieved, this.playerSpeed * 4);
            }
            
            accelerate() {
                this.playerSpeed = Math.min(this.maxSpeed, this.playerSpeed + this.acceleration * 2);
            }
            
            activateNitro() {
                if (this.nitroCharge < 30 || this.skillCooldowns.nitro || this.nitroActive) return;
                
                this.nitroActive = true;
                this.nitroCharge -= 30;
                this.nitroBar.style.width = `${this.nitroCharge}%`;
                this.nitroChargeBar.style.width = `${this.nitroCharge}%`;
                
                // 3秒氮气加速
                this.playerSpeed = Math.min(this.maxSpeed * 1.8, this.playerSpeed + 15);
                this.acceleration *= 2.5;
                
                // 创建氮气特效
                this.createNitroParticles();
                
                setTimeout(() => {
                    this.nitroActive = false;
                    this.acceleration = this.baseAcceleration;
                    const exhaust = this.playerCar.querySelector('.car-exhaust');
                    exhaust.style.boxShadow = '0 0 15px rgba(255, 26, 26, 0.8)';
                    
                    // 设置冷却时间
                    this.skillCooldowns.nitro = 3;
                    this.updateSkillCooldown('nitro');
                }, 3000);
            }
            
            activateShield() {
                if (this.skillCooldowns.shield || this.shieldActive) return;
                
                this.shieldActive = true;
                this.playerCar.style.boxShadow = '0 0 30px rgba(76, 175, 80, 0.9), 0 0 60px rgba(76, 175, 80, 0.7), inset 0 0 15px rgba(255, 255, 255, 0.2)';
                
                // 5秒护盾
                setTimeout(() => {
                    this.shieldActive = false;
                    this.playerCar.style.boxShadow = '0 0 30px rgba(255, 26, 117, 0.8), inset 0 0 15px rgba(255, 255, 255, 0.2)';
                    
                    // 设置冷却时间
                    this.skillCooldowns.shield = 5;
                    this.updateSkillCooldown('shield');
                }, 5000);
            }
            
            activateDrift() {
                if (this.skillCooldowns.drift || this.driftActive) return;
                
                this.driftActive = true;
                this.turnSpeed *= 1.8;
                
                // 3秒飘移
                setTimeout(() => {
                    this.driftActive = false;
                    this.turnSpeed = 12;
                    
                    // 设置冷却时间
                    this.skillCooldowns.drift = 6;
                    this.updateSkillCooldown('drift');
                }, 3000);
            }
            
            updateSkillCooldown(skill) {
                const cooldownElement = {
                    'nitro': this.nitroCooldown,
                    'shield': this.shieldCooldown,
                    'drift': this.driftCooldown
                }[skill];
                
                cooldownElement.textContent = `${this.skillCooldowns[skill]}s`;
                
                const interval = setInterval(() => {
                    if (this.skillCooldowns[skill] <= 0) {
                        clearInterval(interval);
                        cooldownElement.textContent = '';
                        return;
                    }
                    
                    this.skillCooldowns[skill]--;
                    cooldownElement.textContent = `${this.skillCooldowns[skill]}s`;
                }, 1000);
            }
            
            createNitroParticles() {
                for (let i = 0; i < 20; i++) {
                    setTimeout(() => {
                        if (!this.gameOver) {
                            const particle = document.createElement('div');
                            particle.className = 'particle';
                            particle.style.background = `linear-gradient(135deg, #00ffff, #00bfff)`;
                            particle.style.width = `${4 + Math.random() * 8}px`;
                            particle.style.height = `${4 + Math.random() * 8}px`;
                            particle.style.left = `${this.playerX + (-15 + Math.random() * 30)}px`;
                            particle.style.top = `${this.playerY + 80}px`;
                            particle.style.boxShadow = '0 0 10px rgba(0, 255, 255, 0.8)';
                            
                            this.road.appendChild(particle);
                            
                            this.particles.push({
                                element: particle,
                                x: parseFloat(particle.style.left),
                                y: parseFloat(particle.style.top),
                                speedX: -8 + Math.random() * 16,
                                speedY: 5 + Math.random() * 10,
                                life: 25,
                                opacity: 1
                            });
                        }
                    }, i * 40);
                }
            }
            
            createExplosion(x, y) {
                const explosion = document.createElement('div');
                explosion.className = 'explosion';
                explosion.style.left = `${x}px`;
                explosion.style.top = `${y}px`;
                
                this.road.appendChild(explosion);
                
                setTimeout(() => {
                    explosion.remove();
                }, 500);
            }
            
            updateParticles() {
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.speedX;
                    p.y += p.speedY;
                    
                    p.life--;
                    p.opacity = p.life / 25;
                    
                    p.element.style.left = `${p.x}px`;
                    p.element.style.top = `${p.y}px`;
                    p.element.style.opacity = p.opacity;
                    
                    if (p.life <= 0 || p.y > this.containerHeight + 100 || p.x < -50 || p.x > this.containerWidth + 50) {
                        p.element.remove();
                        this.particles.splice(i, 1);
                    }
                }
            }
            
            spawnObstacles() {
                if (this.gameOver || !this.gameStarted) return;
                
                const obstacleTypes = ['car', 'truck', 'police', 'motorcycle'];
                const randomType = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)];
                
                const obstacle = document.createElement('div');
                obstacle.className = 'obstacle obstacle-' + randomType;
                
                // 根据类型设置尺寸
                const dimensions = {
                    'car': { width: 50, height: 80 },
                    'truck': { width: 70, height: 90 },
                    'police': { width: 55, height: 85 },
                    'motorcycle': { width: 30, height: 60 }
                };
                
                const { width, height } = dimensions[randomType];
                
                // 确保障碍物不会生成在道路边缘
                const safeLeft = 70;
                const safeRight = this.containerWidth - 70 - width;
                const leftPos = safeLeft + Math.random() * (safeRight - safeLeft);
                
                obstacle.style.width = `${width}px`;
                obstacle.style.height = `${height}px`;
                obstacle.style.left = `${leftPos}px`;
                obstacle.style.top = '-150px';
                
                this.road.appendChild(obstacle);
                
                // 添加子元素（根据类型）
                if (randomType === 'car') {
                    const topPart = document.createElement('div');
                    topPart.className = 'obstacle-car-top';
                    obstacle.appendChild(topPart);
                } else if (randomType === 'truck') {
                    const cab = document.createElement('div');
                    cab.className = 'obstacle-truck-cab';
                    obstacle.appendChild(cab);
                } else if (randomType === 'police') {
                    const topPart = document.createElement('div');
                    topPart.className = 'obstacle-police-top';
                    obstacle.appendChild(topPart);
                    
                    const bottomPart = document.createElement('div');
                    bottomPart.className = 'obstacle-police-bottom';
                    obstacle.appendChild(bottomPart);
                    
                    const light = document.createElement('div');
                    light.className = 'police-light';
                    bottomPart.appendChild(light);
                } else if (randomType === 'motorcycle') {
                    const seat = document.createElement('div');
                    seat.className = 'motorcycle-seat';
                    obstacle.appendChild(seat);
                }
                
                this.obstacles.push({
                    element: obstacle,
                    x: leftPos,
                    y: -150,
                    width: width,
                    height: height,
                    speed: 3 + Math.random() * 3 + this.playerSpeed * 0.6 * this.difficulty,
                    type: randomType
                });
                
                // 根据速度和难度调整生成频率
                const baseFrequency = 1200;
                const speedFactor = Math.max(0.4, 1 - this.playerSpeed / 60);
                const difficultyFactor = Math.max(0.6, 1.4 - this.difficulty * 0.2);
                const spawnInterval = baseFrequency * speedFactor * difficultyFactor;
                
                setTimeout(() => this.spawnObstacles(), spawnInterval);
            }
            
            spawnCoins() {
                if (this.gameOver || !this.gameStarted) return;
                
                const coin = document.createElement('div');
                coin.className = 'coin';
                
                // 确保不会生成在道路边缘
                const safeLeft = 80;
                const safeRight = this.containerWidth - 80;
                const leftPos = safeLeft + Math.random() * (safeRight - safeLeft);
                
                coin.style.left = `${leftPos}px`;
                coin.style.top = '-80px';
                
                this.road.appendChild(coin);
                
                this.coins.push({
                    element: coin,
                    x: leftPos,
                    y: -80,
                    width: 25,
                    height: 25,
                    speed: 4 + this.playerSpeed * 0.5
                });
                
                setTimeout(() => this.spawnCoins(), this.coinFrequency);
            }
            
            spawnPowerups() {
                if (this.gameOver || !this.gameStarted) return;
                
                const powerupTypes = ['nitro', 'shield'];
                const randomType = powerupTypes[Math.floor(Math.random() * powerupTypes.length)];
                
                const powerup = document.createElement('div');
                powerup.className = randomType + '-powerup';
                
                // 确保不会生成在道路边缘
                const safeLeft = 85;
                const safeRight = this.containerWidth - 85;
                const leftPos = safeLeft + Math.random() * (safeRight - safeLeft);
                
                powerup.style.left = `${leftPos}px`;
                powerup.style.top = '-100px';
                
                this.road.appendChild(powerup);
                
                this.powerups.push({
                    element: powerup,
                    x: leftPos,
                    y: -100,
                    width: 35,
                    height: 35,
                    speed: 3 + this.playerSpeed * 0.4,
                    type: randomType
                });
                
                setTimeout(() => this.spawnPowerups(), this.powerupFrequency);
            }
            
            moveObstacles() {
                for (let i = this.obstacles.length - 1; i >= 0; i--) {
                    const obs = this.obstacles[i];
                    obs.y += obs.speed;
                    obs.element.style.top = `${obs.y}px`;
                    
                    // 移除超出屏幕的障碍物
                    if (obs.y > this.containerHeight + 100) {
                        obs.element.remove();
                        this.obstacles.splice(i, 1);
                    }
                }
            }
            
            moveCoins() {
                for (let i = this.coins.length - 1; i >= 0; i--) {
                    const coin = this.coins[i];
                    coin.y += coin.speed;
                    coin.element.style.top = `${coin.y}px`;
                    
                    // 移除超出屏幕的硬币
                    if (coin.y > this.containerHeight + 100) {
                        coin.element.remove();
                        this.coins.splice(i, 1);
                    }
                }
            }
            
            movePowerups() {
                for (let i = this.powerups.length - 1; i >= 0; i--) {
                    const powerup = this.powerups[i];
                    powerup.y += powerup.speed;
                    powerup.element.style.top = `${powerup.y}px`;
                    
                    // 移除超出屏幕的道具
                    if (powerup.y > this.containerHeight + 100) {
                        powerup.element.remove();
                        this.powerups.splice(i, 1);
                    }
                }
            }
            
            updateRoad() {
                if (this.gameOver || !this.gameStarted) return;
                
                this.roadOffset += this.playerSpeed * 3;
                const markings = document.querySelectorAll('.road-marking');
                
                markings.forEach(marking => {
                    let top = parseInt(marking.style.top) || 0;
                    top += this.playerSpeed * 4 + (this.nitroActive ? 8 : 0);
                    
                    if (top > this.containerHeight + 50) {
                        top = -50;
                    }
                    
                    marking.style.top = `${top}px`;
                });
                
                requestAnimationFrame(() => this.updateRoad());
            }
            
            checkCollisions() {
                const playerRect = {
                    x: this.playerX - 30,
                    y: this.playerY - 100,
                    width: 60,
                    height: 100
                };
                
                // 检查与障碍物的碰撞
                for (let i = 0; i < this.obstacles.length; i++) {
                    const obs = this.obstacles[i];
                    if (this.checkCollision(playerRect, obs)) {
                        if (this.shieldActive) {
                            // 护盾吸收碰撞
                            this.shieldActive = false;
                            this.playerCar.style.boxShadow = '0 0 30px rgba(255, 26, 117, 0.8), inset 0 0 15px rgba(255, 255, 255, 0.2)';
                            this.createExplosion(obs.x + obs.width / 2, obs.y + obs.height / 2);
                            obs.element.remove();
                            this.obstacles.splice(i, 1);
                            this.score += 200;
                        } else {
                            this.endGame();
                            return;
                        }
                    }
                }
                
                // 检查与硬币的碰撞
                for (let i = this.coins.length - 1; i >= 0; i--) {
                    const coin = this.coins[i];
                    if (this.checkCollision(playerRect, coin)) {
                        this.collectCoin(i);
                    }
                }
                
                // 检查与道具的碰撞
                for (let i = this.powerups.length - 1; i >= 0; i--) {
                    const powerup = this.powerups[i];
                    if (this.checkCollision(playerRect, powerup)) {
                        this.collectPowerup(i, powerup.type);
                    }
                }
            }
            
            checkCollision(rect1, rect2) {
                return (
                    rect1.x < rect2.x + rect2.width &&
                    rect1.x + rect1.width > rect2.x &&
                    rect1.y < rect2.y + rect2.height &&
                    rect1.y + rect1.height > rect2.y
                );
            }
            
            collectCoin(index) {
                const coin = this.coins[index];
                coin.element.remove();
                this.coins.splice(index, 1);
                
                this.score += 100;
                this.nitroCharge = Math.min(this.nitroMax, this.nitroCharge + 3);
                
                // 创建收集特效
                this.createCollectEffect(coin.x + 12, coin.y + 12, '#ffd700');
            }
            
            collectPowerup(index, type) {
                const powerup = this.powerups[index];
                powerup.element.remove();
                this.powerups.splice(index, 1);
                
                switch (type) {
                    case 'nitro':
                        this.nitroCharge = Math.min(this.nitroMax, this.nitroCharge + 40);
                        break;
                    case 'shield':
                        if (!this.shieldActive && !this.skillCooldowns.shield) {
                            this.activateShield();
                        }
                        break;
                }
                
                // 创建收集特效
                const color = type === 'nitro' ? '#00ffff' : '#4caf50';
                this.createCollectEffect(powerup.x + 17, powerup.y + 17, color);
            }
            
            createCollectEffect(x, y, color) {
                for (let i = 0; i < 10; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.background = color;
                    particle.style.width = `${2 + Math.random() * 5}px`;
                    particle.style.height = `${2 + Math.random() * 5}px`;
                    particle.style.left = `${x}px`;
                    particle.style.top = `${y}px`;
                    particle.style.boxShadow = `0 0 8px ${color}`;
                    
                    this.road.appendChild(particle);
                    
                    this.particles.push({
                        element: particle,
                        x: x,
                        y: y,
                        speedX: -4 + Math.random() * 8,
                        speedY: -4 + Math.random() * 8,
                        life: 15,
                        opacity: 1
                    });
                }
            }
            
            updateGameStats() {
                this.score += Math.floor(this.playerSpeed * 0.3);
                this.scoreDisplay.textContent = `SCORE: ${Math.floor(this.score)}`;
                this.speedDisplay.textContent = `SPEED: ${Math.floor(this.playerSpeed * 4)} KM/H`;
            }
            
            updateSkillsUI() {
                // 更新技能按钮状态
                const nitroReady = this.nitroCharge >= 30 && !this.skillCooldowns.nitro;
                this.nitroSkillBtn.style.opacity = nitroReady ? '1' : '0.5';
                this.nitroSkillBtn.classList.toggle('inactive', !nitroReady);
                
                const shieldReady = !this.skillCooldowns.shield;
                this.shieldSkillBtn.style.opacity = shieldReady ? '1' : '0.5';
                this.shieldSkillBtn.classList.toggle('inactive', !shieldReady);
                
                const driftReady = !this.skillCooldowns.drift;
                this.driftSkillBtn.style.opacity = driftReady ? '1' : '0.5';
                this.driftSkillBtn.classList.toggle('inactive', !driftReady);
            }
            
            endGame() {
                this.gameOver = true;
                this.finalScoreDisplay.textContent = Math.floor(this.score);
                this.maxSpeedDisplay.textContent = `${Math.floor(this.maxSpeedAchieved)} KM/H`;
                
                this.gameOverScreen.style.display = 'flex';
                
                // 移除所有游戏对象
                this.obstacles.forEach(obs => obs.element.remove());
                this.coins.forEach(coin => coin.element.remove());
                this.powerups.forEach(powerup => powerup.element.remove());
                this.obstacles = [];
                this.coins = [];
                this.powerups = [];
            }
            
            restartGame() {
                this.gameOver = false;
                this.gameStarted = true;
                this.score = 0;
                this.maxSpeedAchieved = 0;
                this.nitroCharge = 0;
                this.difficulty = 1;
                this.maxSpeed = 40;
                this.playerSpeed = 0;
                this.playerX = this.containerWidth / 2;
                this.skillCooldowns = { nitro: 0, shield: 0, drift: 0 };
                this.nitroActive = false;
                this.shieldActive = false;
                this.driftActive = false;
                
                // 重置UI
                this.scoreDisplay.textContent = 'SCORE: 0';
                this.speedDisplay.textContent = 'SPEED: 0 KM/H';
                this.nitroBar.style.width = '0%';
                this.nitroChargeBar.style.width = '0%';
                this.nitroCooldown.textContent = '';
                this.shieldCooldown.textContent = '';
                this.driftCooldown.textContent = '';
                
                this.gameOverScreen.style.display = 'none';
                this.playerCar.style.left = `${this.playerX}px`;
                this.playerCar.style.transform = 'translateX(-50%) rotateZ(0deg)';
                this.playerCar.style.boxShadow = '0 0 30px rgba(255, 26, 117, 0.8), inset 0 0 15px rgba(255, 255, 255, 0.2)';
                
                // 清除所有粒子
                this.particles.forEach(p => p.element.remove());
                this.particles = [];
                
                // 重新开始游戏
                this.startGame();
            }
            
            showMainMenu() {
                if (confirm('Return to main menu?\n(This will restart the game)')) {
                    this.restartGame();
                }
            }
        }
        
        // 初始化游戏
        document.addEventListener('DOMContentLoaded', () => {
            new StreetRacingProMobile();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>🎮 超级游戏合集 PRO - 完整游戏门户</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }

        :root {
            --primary-color: #4cc9f0;
            --secondary-color: #7209b7;
            --success-color: #06d6a0;
            --warning-color: #ffd166;
            --danger-color: #ef476f;
            --dark-bg: #0f172a;
            --light-bg: #f8f9fa;
            --text-dark: #212529;
            --text-light: #f8f9fa;
            --card-bg: rgba(26, 32, 44, 0.95);
            --modal-bg: rgba(15, 23, 42, 0.98);
        }

        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0d1b2a, #1b263b);
            min-height: 100vh;
            color: var(--text-light);
            overflow-x: hidden;
            position: relative;
            line-height: 1.6;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(76,201,240,0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(114,9,183,0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(6,214,160,0.08) 0%, transparent 50%);
            z-index: -1;
            animation: gradientShift 20s ease-in-out infinite alternate;
        }

        @keyframes gradientShift {
            0% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        /* 加载动画 */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--dark-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .loader.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(76, 201, 240, 0.3);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            opacity: 0;
            animation: fadeIn 0.8s ease forwards 0.5s;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* 头部样式 */
        .header {
            text-align: center;
            padding: 40px 20px;
            margin-bottom: 40px;
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--primary-color), transparent);
            border-radius: 2px;
        }

        .header h1 {
            font-size: 3.8em;
            font-weight: 800;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color), var(--success-color), var(--warning-color));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
            text-shadow: 0 0 40px rgba(76, 201, 240, 0.3);
            animation: glow 3s ease-in-out infinite alternate;
            letter-spacing: 1px;
        }

        @keyframes glow {
            0% { 
                text-shadow: 0 0 10px rgba(76, 201, 240, 0.3),
                           0 0 20px rgba(114, 9, 183, 0.2);
            }
            100% { 
                text-shadow: 0 0 30px rgba(76, 201, 240, 0.6),
                           0 0 40px rgba(114, 9, 183, 0.4),
                           0 0 50px rgba(6, 214, 160, 0.2);
            }
        }

        .header p {
            font-size: 1.3em;
            color: rgba(255, 255, 255, 0.85);
            max-width: 900px;
            margin: 0 auto 30px;
            line-height: 1.7;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(76, 201, 240, 0.2);
            min-width: 180px;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .stat-item:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
        }

        .stat-value {
            font-size: 2.2em;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 控制栏 */
        .controls-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 30px 0;
            padding: 20px;
            background: rgba(26, 32, 44, 0.7);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(76, 201, 240, 0.1);
            flex-wrap: wrap;
            gap: 20px;
        }

        .search-box {
            flex: 1;
            min-width: 300px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            background: rgba(15, 23, 42, 0.8);
            border: 2px solid rgba(76, 201, 240, 0.3);
            border-radius: 50px;
            color: white;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 20px rgba(76, 201, 240, 0.3);
        }

        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-color);
            font-size: 1.2em;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 12px 25px;
            background: rgba(15, 23, 42, 0.8);
            border: 2px solid rgba(76, 201, 240, 0.2);
            border-radius: 50px;
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .filter-btn:hover {
            background: rgba(76, 201, 240, 0.1);
            border-color: var(--primary-color);
            color: white;
        }

        .filter-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
            box-shadow: 0 0 15px rgba(76, 201, 240, 0.4);
        }

        /* 游戏网格 */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 35px;
            margin: 40px 0;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 25px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid transparent;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            position: relative;
            backdrop-filter: blur(15px);
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            z-index: 2;
        }

        .game-card:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: var(--primary-color);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5),
                        0 0 40px rgba(76, 201, 240, 0.4);
        }

        .game-card-header {
            padding: 30px 30px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(76, 201, 240, 0.2);
            position: relative;
            overflow: hidden;
        }

        .game-card-header::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 100%;
            background: linear-gradient(135deg, rgba(76,201,240,0.05), transparent);
            z-index: -1;
        }

        .game-icon {
            font-size: 3.5em;
            margin-bottom: 20px;
            display: block;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .game-title {
            font-size: 2em;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .game-subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1em;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .game-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--danger-color);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(239, 71, 111, 0.3);
        }

        .game-card-body {
            padding: 25px 30px;
            flex: 1;
        }

        .game-description {
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.7;
            margin-bottom: 25px;
            font-size: 1em;
        }

        .game-features {
            list-style: none;
            margin-bottom: 25px;
        }

        .game-features li {
            padding: 10px 0;
            color: rgba(255, 255, 255, 0.75);
            position: relative;
            padding-left: 35px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .game-features li:last-child {
            border-bottom: none;
        }

        .game-features li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: var(--success-color);
            font-weight: bold;
            font-size: 1.2em;
            width: 25px;
            height: 25px;
            background: rgba(6, 214, 160, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-stats {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(76, 201, 240, 0.1);
        }

        .game-stat {
            text-align: center;
        }

        .game-stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: var(--primary-color);
        }

        .game-stat-label {
            font-size: 0.8em;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .game-card-footer {
            padding: 25px 30px;
            background: rgba(15, 23, 42, 0.8);
            text-align: center;
            border-top: 1px solid rgba(76, 201, 240, 0.1);
        }

        .play-btn {
            display: inline-block;
            background: linear-gradient(45deg, var(--primary-color), #4361ee);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2em;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
            width: 100%;
            max-width: 250px;
        }

        .play-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.6s;
        }

        .play-btn:hover::before {
            left: 100%;
        }

        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4),
                        0 0 30px rgba(76, 201, 240, 0.3);
        }

        /* 游戏卡片特定颜色 */
        .game-card[data-game="STREET RACING PRO.html"]::before { background: linear-gradient(90deg, #ff1a75, #ff4d94); }
        .game-card[data-game="STREET RACING PRO2.0.html"]::before { background: linear-gradient(90deg, #4cc9f0, #4361ee); }
        .game-card[data-game="doodle jump.html"]::before { background: linear-gradient(90deg, #06d6a0, #2e7d32); }
        .game-card[data-game="progame2.html"]::before { background: linear-gradient(90deg, #ffd166, #f9844a); }

        .game-card[data-game="STREET RACING PRO.html"] .play-btn { background: linear-gradient(45deg, #ff1a75, #ff4d94); }
        .game-card[data-game="STREET RACING PRO2.0.html"] .play-btn { background: linear-gradient(45deg, #4cc9f0, #4361ee); }
        .game-card[data-game="doodle jump.html"] .play-btn { background: linear-gradient(45deg, #06d6a0, #2e7d32); }
        .game-card[data-game="progame2.html"] <div class="play-btn"></div>
